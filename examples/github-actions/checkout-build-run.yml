name: Centralized Branch Checkout Build Run

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to validate
        required: true
        default: develop
      gate:
        description: Regression layer to run
        required: true
        default: level1
  schedule:
    - cron: "30 18 * * 1-5"

jobs:
  checkout-build-run:
    runs-on: self-hosted
    env:
      REGAUTO_DATABASE_URL: ${{ secrets.REGAUTO_DATABASE_URL }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install regression framework directly on runner
        run: python -m pip install git+https://github.com/YOUR_ORG/enterprise-regression-platform.git
      - name: Checkout branch, build app, and run regression layer
        run: |
          regauto checkout-build-run \
            --remote-url https://github.com/YOUR_ORG/YOUR_APP_REPO.git \
            --branch "${{ inputs.branch || 'develop' }}" \
            --gate "${{ inputs.gate || 'level1' }}" \
            --workspace-root "$RUNNER_TEMP/regression-workspaces" \
            --directory-name YOUR_APP_REPO \
            --results-dir "$RUNNER_TEMP/regression-results" \
            --trigger schedule \
            --publish
