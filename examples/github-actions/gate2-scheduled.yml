name: Level 3 Scheduled Regression

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * 1-5"

jobs:
  level3:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: [test]
    env:
      REGAUTO_DATABASE_URL: ${{ secrets.REGAUTO_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install regression framework
        run: pip install git+https://github.com/YOUR_ORG/enterprise-regression-platform.git
      - name: Run Level 3 and publish dashboard metadata
        run: |
          regauto run-level3 \
            --repo-root . \
            --results-dir regression-results/level3 \
            --branch ${{ matrix.branch }} \
            --trigger schedule \
            --publish
      - name: Upload regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: level3-regression-results
          path: regression-results/level3
