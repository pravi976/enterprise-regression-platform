default_branch: main
policies:
  develop:
    environment: DEV
    gates: [level1, level2]
    include_tags: [develop]
    exclude_tags: []
    services: []
    clean_workspace: false
    disabled_gates: [level3, level4, level5]
    gate_overrides:
      level1:
        enabled: true
        reason: Develop branch runs fast validation first
      level2:
        enabled: true
        reason: Develop branch runs service-level API checks
    commands:
      build: []
  test:
    environment: QA
    gates: [level1, level2, level3]
    include_tags: [test]
    exclude_tags: []
    services: []
    clean_workspace: false
    disabled_gates: [level4, level5]
    commands:
      build: []
  release:
    environment: PREPROD
    gates: [level1, level2, level3, level4, level5]
    include_tags: [release]
    exclude_tags: []
    services: []
    clean_workspace: true
    disabled_gates: []
    gate_overrides:
      level1:
        enabled: true
      level2:
        enabled: true
      level3:
        enabled: true
      level4:
        enabled: true
      level5:
        enabled: true
        reason: Release branch requires full certification including operational checks
    commands:
      build: []
