repository: sample-application-repo
owner: platform-quality
default_branch: main
remote_url: https://github.com/YOUR_ORG/sample-application-repo.git
services_root: regression/services
build_tool: none
commands:
  pre_build: []
  build: []
  post_build: []
  pre_test: []
  post_test: []
gates:
  level1:
    - level1
    - gate1
    - unit
    - critical
  level2:
    - level2
    - gate2
    - component
    - api
  level3:
    - level3
    - integration
  level4:
    - level4
    - e2e
    - journey
  level5:
    - level5
    - operational
    - resilience
gate_policies:
  level1:
    enabled: true
    reason: Fast unit regression layer is active
  level2:
    enabled: true
    reason: Component and API regression layer is active
  level3:
    enabled: true
    reason: Integration regression layer is active
  level4:
    enabled: true
    reason: End-to-end regression layer is active
  level5:
    enabled: true
    reason: Operational regression layer is active
service_owners:
  customer-service: customer-platform-team
  payment-service: payments-team
  notification-service: messaging-team
impact_map:
  src/customer/**:
    - customer-service
  src/payment/**:
    - payment-service
  shared/contracts/customer/**:
    - customer-service
  shared/contracts/payment/**:
    - payment-service
  src/notification/**:
    - notification-service
  shared/messaging/**:
    - notification-service
