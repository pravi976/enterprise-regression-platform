repository: regression-test-consumer
owner: platform-regression
default_branch: develop
services_root: regression/services
build_tool: gradle
health_check:
  urls:
    - http://localhost:8091/api/upstream/ops/status
    - http://localhost:8092/api/downstream/ops/status
commands:
  pre_build:
    - 'chmod +x ./gradlew'
  build:
    - './gradlew --gradle-user-home .gradle-home clean test bootJar'
  post_build: []
  pre_test:
    - |
      set -e
      python - <<'PY' >/dev/null 2>&1 &
      import json
      import re
      from http.server import BaseHTTPRequestHandler, HTTPServer
      from urllib.parse import urlparse
      
      CUSTOMERS = {
          "CUST-1001": {
              "customerId": "CUST-1001",
              "customerName": "Asha Verma",
              "city": "Bengaluru",
              "tier": "GOLD",
              "status": "ACTIVE",
              "creditLimit": 500000.00,
              "currency": "INR",
          },
          "CUST-1002": {
              "customerId": "CUST-1002",
              "customerName": "Rahul Mehta",
              "city": "Mumbai",
              "tier": "SILVER",
              "status": "ACTIVE",
              "creditLimit": 200000.00,
              "currency": "INR",
          },
          "CUST-1003": {
              "customerId": "CUST-1003",
              "customerName": "Neha Iyer",
              "city": "Bengaluru",
              "tier": "PLATINUM",
              "status": "ACTIVE",
              "creditLimit": 750000.00,
              "currency": "INR",
          },
      }
      
      class Handler(BaseHTTPRequestHandler):
          def log_message(self, format, *args):
              return
      
          def _send_json(self, status_code, payload):
              body = json.dumps(payload).encode("utf-8")
              self.send_response(status_code)
              self.send_header("Content-Type", "application/json")
              self.send_header("Content-Length", str(len(body)))
              self.end_headers()
              self.wfile.write(body)
      
          def do_GET(self):
              path = urlparse(self.path).path
              if path == "/api/upstream/ops/status":
                  return self._send_json(200, {"status": "UP"})
              match = re.fullmatch(r"/api/upstream/customers/([^/]+)", path)
              if match:
                  customer_id = match.group(1)
                  customer = CUSTOMERS.get(customer_id)
                  if customer:
                      return self._send_json(200, customer)
                  return self._send_json(404, {"error": "not_found", "customerId": customer_id})
              return self._send_json(404, {"error": "not_found", "path": path})
      
      HTTPServer(("0.0.0.0", 8091), Handler).serve_forever()
      PY
      echo $! > .regauto-upstream-stub.pid
      i=0
      while [ $i -lt 60 ]; do
        if curl -fsS "http://localhost:8091/api/upstream/ops/status" >/dev/null 2>&1; then
          break
        fi
        sleep 1
        i=$((i+1))
      done
      if [ $i -ge 60 ]; then
        echo "upstream stub did not become ready" >&2
        exit 1
      fi

      CONSUMER_JAR_PATH="$(ls -1 build/libs/regression-test-consumer-*.jar 2>/dev/null | head -n 1)"
      if [ -z "$CONSUMER_JAR_PATH" ]; then
        echo "Consumer jar not found under build/libs" >&2
        ls -la build/libs || true
        exit 1
      fi
      java -jar "$CONSUMER_JAR_PATH" >/dev/null 2>&1 &
      echo $! > .regauto-consumer.pid
      i=0
      while [ $i -lt 60 ]; do
        if curl -fsS "http://localhost:8092/api/downstream/ops/status" >/dev/null 2>&1; then
          exit 0
        fi
        sleep 1
        i=$((i+1))
      done
      echo "consumer app did not become ready" >&2
      exit 1
  post_test:
    - |
      set +e
      for file in .regauto-consumer.pid .regauto-upstream-stub.pid; do
        if [ -f "$file" ]; then
          PID="$(cat "$file")"
          kill "$PID" >/dev/null 2>&1
          sleep 1
          kill -9 "$PID" >/dev/null 2>&1
          rm -f "$file"
        fi
      done
      exit 0
gate_policies:
  level3:
    enabled: true
    reason: Downstream integration regression is active
  level4:
    enabled: true
    reason: Downstream end-to-end regression is active
  level5:
    enabled: true
    reason: Downstream operational regression is active
service_owners:
  downstream-customer-journey: downstream-team
impact_map:
  src/main/java/com/enterprise/regression/downstream/client/**:
    - downstream-customer-journey
  src/main/java/com/enterprise/regression/downstream/journey/**:
    - downstream-customer-journey
  src/main/java/com/enterprise/regression/downstream/ops/**:
    - downstream-customer-journey
  src/main/resources/**:
    - downstream-customer-journey
